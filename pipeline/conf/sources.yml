# Catalogue of every data source the pipeline knows about.
#
# - id: machine name (also used for output filename: data/<category>/<id>.parquet)
# - module: dotted path to fetcher class
# - cadence: daily / weekly / monthly / quarterly / annual / on_demand
# - source_url: human-readable link (for documentation, not the API endpoint)
# - join_keys: which boundary keys this dataset joins to (used by Power BI)
# - enabled: skip a fetcher entirely without removing it
# - notes: anything a future maintainer needs to know

sources:

  # ─── Geographies (run FIRST — every other fetcher needs these) ─────
  - id: boundaries
    category: geo
    module: pipeline.src.fetchers._boundaries.BoundariesFetcher
    cadence: annual
    source_url: https://geoportal.statistics.gov.uk/
    join_keys: [LSOA21CD, WD25CD, LAD25CD]
    enabled: true
    notes: |
      Pulls authoritative LSOA / ward / LAD boundary GeoJSONs from ONS Open
      Geography Portal and writes them to data/boundaries/. Must run before
      anything that calls load_boundary().

  # ─── Healthcare supply ─────────────────────────────────────────────
  - id: gp_practices
    category: healthcare
    module: pipeline.src.fetchers.healthcare.gp_practices.GpPracticesFetcher
    cadence: monthly
    source_url: https://digital.nhs.uk/services/organisation-data-service/export-data-files/csv-downloads/gp-and-gp-practice-related-data
    join_keys: [LSOA21CD, WD25CD, LAD25CD, ODS_code]
    enabled: true
    notes: |
      EPRACCUR (GP practices) joined to ONSPD for lat/lng. Filter to active (StatusCode=A)
      practices with PrescribingSetting=4 in the 9 NW London LADs.

  - id: hospitals
    category: healthcare
    module: pipeline.src.fetchers.healthcare.hospitals.HospitalsFetcher
    cadence: monthly
    source_url: https://www.nhs.uk/about-us/nhs-website-datasets/
    join_keys: [LSOA21CD, WD25CD, LAD25CD]
    enabled: true
    notes: NHS ETS.csv (hospital sites) — has lat/lng natively.

  - id: pharmacies
    category: healthcare
    module: pipeline.src.fetchers.healthcare.pharmacies.PharmaciesFetcher
    cadence: monthly
    source_url: https://www.nhsbsa.nhs.uk/pharmacies-gp-practices-and-appliance-contractors
    join_keys: [LSOA21CD, WD25CD, LAD25CD]
    enabled: true
    notes: NHS BSA dispensing contractors (epharmacylist). Postcode-only — needs ONSPD.

  - id: dentists
    category: healthcare
    module: pipeline.src.fetchers.healthcare.dentists.DentistsFetcher
    cadence: monthly
    source_url: https://www.nhsbsa.nhs.uk/dentists-orthodontists
    join_keys: [LSOA21CD, WD25CD, LAD25CD]
    enabled: true
    notes: NHS general dental practitioners. Postcode-only.

  - id: care_homes
    category: healthcare
    module: pipeline.src.fetchers.healthcare.care_homes.CareHomesFetcher
    cadence: monthly
    source_url: https://www.cqc.org.uk/about-us/transparency/using-cqc-data
    join_keys: [LSOA21CD, WD25CD, LAD25CD]
    enabled: true
    notes: CQC care directory. Has lat/lng. Filter to service_type='Residential'.

  # ─── Outcomes & surveillance ────────────────────────────────────────
  - id: fingertips
    category: outcomes
    module: pipeline.src.fetchers.outcomes.fingertips.FingertipsFetcher
    cadence: monthly
    source_url: https://fingertips.phe.org.uk/api
    join_keys: [LAD25CD, ICB23CD]
    enabled: true
    notes: |
      OHID Fingertips — ~1000 indicators at LA / CCG / ward granularity.
      v1 pulls a curated subset (life expectancy, smoking, obesity, MH prevalence,
      child immunisations, A&E rate, suicide rate, fuel poverty). See
      pipeline/src/fetchers/outcomes/fingertips_indicators.yml for the list.

  - id: prescribing
    category: outcomes
    module: pipeline.src.fetchers.outcomes.prescribing.PrescribingFetcher
    cadence: monthly
    source_url: https://openprescribing.net/api/
    join_keys: [ODS_code, LAD25CD]
    enabled: true
    notes: |
      OpenPrescribing API — practice-level monthly prescribing volumes for selected
      BNF chapters (diabetes, mental health, opioids, antibiotics).

  # ─── Demographics & deprivation ─────────────────────────────────────
  - id: census2021
    category: demographics
    module: pipeline.src.fetchers.demographics.census2021.Census2021Fetcher
    cadence: annual
    source_url: https://www.nomisweb.co.uk/sources/census_2021_bulk
    join_keys: [LSOA21CD, OA21CD]
    enabled: true
    notes: |
      Census 2021 LSOA-level tables. v1 pulls TS001 (population), TS021 (ethnicity),
      TS037 (general health), TS038 (disability), TS017 (unpaid care), TS066 (NS-SeC).

  - id: imd2025
    category: demographics
    module: pipeline.src.fetchers.demographics.imd2025.Imd2025Fetcher
    cadence: annual
    source_url: https://www.gov.uk/government/statistics/english-indices-of-deprivation-2025
    join_keys: [LSOA21CD]
    enabled: true
    notes: MHCLG IoD 2025 — full LSOA21 coverage incl. the 76 LSOAs missing in IoD 2019.

  # ─── Environment ────────────────────────────────────────────────────
  - id: greenspace
    category: environment
    module: pipeline.src.fetchers.environment.greenspace.GreenspaceFetcher
    cadence: quarterly
    source_url: https://osdatahub.os.uk/downloads/open/OpenGreenspace
    join_keys: [LSOA21CD, WD25CD]
    enabled: true
    notes: OS Open Greenspace polygons — parks, sports pitches, allotments, playgrounds.

  - id: air_quality_aurn
    category: environment
    module: pipeline.src.fetchers.environment.air_quality_aurn.AurnFetcher
    cadence: daily
    source_url: https://uk-air.defra.gov.uk/data/data_selector_service
    join_keys: [LSOA21CD, monitor_id]
    enabled: true
    notes: DEFRA AURN sites — daily mean NO2, PM2.5, PM10, O3 for NW London monitors.

  - id: laei
    category: environment
    module: pipeline.src.fetchers.environment.laei.LaeiFetcher
    cadence: annual
    source_url: https://data.london.gov.uk/dataset/london-atmospheric-emissions-inventory--laei--2019
    join_keys: [LSOA21CD]
    enabled: false
    notes: |
      Modelled NO2/PM2.5 raster aggregated to LSOA. Disabled until raster processing
      dependencies (rasterio, rioxarray) are wired up. See backlog.

  # ─── Transport ──────────────────────────────────────────────────────
  - id: ptal
    category: transport
    module: pipeline.src.fetchers.transport.ptal.PtalFetcher
    cadence: annual
    source_url: https://data.london.gov.uk/dataset/public-transport-accessibility-levels
    join_keys: [LSOA21CD]
    enabled: true
    notes: TfL PTAL grid → LSOA mean.

  - id: tfl_stations
    category: transport
    module: pipeline.src.fetchers.transport.stations.StationsFetcher
    cadence: quarterly
    source_url: https://api.tfl.gov.uk/StopPoint/Mode/tube,overground,elizabeth-line,dlr,national-rail
    join_keys: [LSOA21CD, WD25CD]
    enabled: true
    notes: All TfL rail stations (Tube, Overground, Elizabeth Line, DLR, National Rail).

  # ─── Crime ──────────────────────────────────────────────────────────
  - id: police_uk_crime
    category: crime
    module: pipeline.src.fetchers.crime.police_uk.PoliceUkFetcher
    cadence: monthly
    source_url: https://data.police.uk/docs/
    join_keys: [LSOA21CD]
    enabled: true
    notes: Snapped street-level crimes for NW London Met Police force area, monthly.

  # ─── Food environment ───────────────────────────────────────────────
  - id: fsa_food_hygiene
    category: food
    module: pipeline.src.fetchers.food.fsa.FsaFetcher
    cadence: weekly
    source_url: https://api.ratings.food.gov.uk/help
    join_keys: [LSOA21CD, WD25CD]
    enabled: true
    notes: |
      Food Standards Agency Food Hygiene Ratings. Use the BusinessType filter to
      separate fast food, restaurants, supermarkets, takeaways. Per-borough query.

  # ─── Housing & deprivation overlays ─────────────────────────────────
  - id: epc_domestic
    category: housing
    module: pipeline.src.fetchers.housing.epc.EpcFetcher
    cadence: quarterly
    source_url: https://epc.opendatacommunities.org/
    join_keys: [LSOA21CD]
    enabled: true
    notes: |
      Domestic EPC certificates aggregated to LSOA mean. Requires API key set in
      env var EPC_AUTH_TOKEN. Free signup at epc.opendatacommunities.org.

  - id: fuel_poverty
    category: housing
    module: pipeline.src.fetchers.housing.fuel_poverty.FuelPovertyFetcher
    cadence: annual
    source_url: https://www.gov.uk/government/collections/fuel-poverty-sub-regional-statistics
    join_keys: [LSOA21CD]
    enabled: true
    notes: DESNZ sub-regional fuel poverty (LIHC indicator) at LSOA level.
