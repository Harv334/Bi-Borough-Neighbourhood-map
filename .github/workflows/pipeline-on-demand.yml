name: Pipeline (on demand)

# Run an arbitrary fetcher manually from the GitHub Actions tab.
# Useful when troubleshooting one source, or refreshing immediately
# after a known upstream release.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source id (see pipeline/conf/sources.yml)"
        required: true
      no_export:
        description: "Skip exporters (leaflet json + powerbi index)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pipeline (with raster extras)
        # (removed — pyproject.toml is at repo root)
        run: |
          pip install --upgrade pip
          pip install -e ".[raster]"

      - name: Run requested fetcher
        env:
          OS_DATA_HUB_TOKEN: ${{ secrets.OS_DATA_HUB_TOKEN }}
          EPC_AUTH_TOKEN: ${{ secrets.EPC_AUTH_TOKEN }}
        run: |
          ARGS="--source ${{ inputs.source }}"
          if [ "${{ inputs.no_export }}" = "true" ]; then
            ARGS="$ARGS --no-export"
          fi
          pipeline run $ARGS

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): on-demand refresh of ${{ inputs.source }}"
          file_pattern: "data/** index.html"
