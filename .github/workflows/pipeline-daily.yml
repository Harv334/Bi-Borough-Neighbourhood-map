name: Pipeline (daily)

# Runs every fetcher whose cadence is "daily" — currently AURN air quality.
# Tight schedule because AURN posts new dailies overnight UK time.

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC ≈ 06:30 BST
  workflow_dispatch:
    inputs:
      source:
        description: "Specific source id to run (optional, blank = all daily)"
        required: false
        default: ""

permissions:
  contents: write   # for committing refreshed parquets

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pipeline
        working-directory: pipeline
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run daily fetchers
        env:
          OS_DATA_HUB_TOKEN: ${{ secrets.OS_DATA_HUB_TOKEN }}
          EPC_AUTH_TOKEN: ${{ secrets.EPC_AUTH_TOKEN }}
        run: |
          if [ -n "${{ inputs.source }}" ]; then
            pipeline run --source "${{ inputs.source }}"
          else
            pipeline run --cadence daily
          fi

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): daily refresh ${{ github.run_id }}"
          file_pattern: "data/** index.html"
